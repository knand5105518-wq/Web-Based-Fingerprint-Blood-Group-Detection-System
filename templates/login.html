<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            background: url('/static/uploads/bg1.jpg') no-repeat center center/cover;
            text-align: center;
            color: white;
            margin-top: 80px;
        }

        /* GLASS EFFECT */
        .box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 10px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkred;
        }

        a {
            display: block;
            margin-top: 10px;
            color: white;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login</h2>

        <!-- 🔥 autocomplete off -->
        <form method="POST" autocomplete="off">

            <!-- 🔥 hidden fields (auto-fill bypass) -->
            <input type="text" name="fakeuser" style="display:none">
            <input type="password" name="fakepass" style="display:none">

            <input type="text" name="username" placeholder="Username" required autocomplete="off">

            <input type="password" name="password" placeholder="Password" required autocomplete="new-password">

            <button type="submit">Login</button>
        </form>

        <a href="/register">New user? Register</a>
    </div>

</body>
</html>
