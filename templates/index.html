<!DOCTYPE html>
<html>
<head>
    <title>Blood Group Detection</title>

    <style>
        body {
            font-family: Arial;

            /* 🔥 FULL SCREEN BACKGROUND */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('/static/uploads/bg.jpg') no-repeat center center fixed;
            background-size: cover;

            text-align: center;
            color: white;

            margin: 0;
            padding: 0;
        }

        /* GLASS EFFECT BOX */
        .container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);

            animation: fadeIn 1.5s ease-in-out;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* BUTTON STYLE */
        a {
            display: block;
            margin: 10px;
            padding: 12px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        a:hover {
            background: darkred;
            transform: scale(1.05);
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🧬 Blood Group Detection</h2>

        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>

</body>
</html>
